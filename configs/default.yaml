audio:
  sample_rate: 48000
  mono: false
  normalize_peak_db: -1.0
  cleanup:
    enabled: true
    remove_dc_offset: true
    high_pass_enabled: true
    high_pass_hz: 80.0
    high_pass_order: 2
    de_esser_enabled: false
    de_esser_threshold_db: -28.0
    de_esser_ratio: 3.0
    de_esser_max_reduction_db: 8.0
    de_esser_band_low_hz: 4500.0
    de_esser_band_high_hz: 9500.0
    de_esser_attack_ms: 4.0
    de_esser_release_ms: 90.0
    de_esser_knee_db: 6.0
    de_esser_stereo_link: true
    fade_ms: 5.0
    noise_gate_enabled: false
    noise_gate_db: -55.0
    noise_gate_floor_db: -24.0
    noise_gate_attack_ms: 4.0
    noise_gate_release_ms: 80.0
    noise_gate_hold_ms: 20.0
    trim_silence_enabled: false
    trim_silence_db: -60.0
    trim_padding_ms: 50.0
    gain_stage_target_db: -20.0

processing:
  denoise_enabled: false
  split_vocals_enabled: false
  demucs_binary: demucs
  demucs_model: htdemucs
  demucs_strict: false
  pitch_correction_enabled: true
  pitch_strength: 0.65
  key_detection_enabled: true
  target_key: null
  voice_conversion_enabled: false
  voice_conversion:
    backend: applio_gradio
    strict: false
    # rvc_cli settings (legacy backend, kept for tools that expose a real
    # `rvc --input ... --output ...` binary; Applio does not, so this is
    # unused by the applio_gradio backend below).
    rvc_binary: rvc
    device: cuda
    # applio_gradio settings: talk to a locally running Applio instance
    # through its built-in Gradio API.
    #
    # IMPORTANT: api_name and param_map below are PLACEHOLDERS. Applio's
    # internal Gradio wiring is not a stable, documented public contract,
    # so the real endpoint name and parameter names must be confirmed
    # against your own running instance before voice conversion will do
    # anything other than pass audio through unchanged:
    #
    #   1. Start Applio (run-applio.bat) and note the URL it prints.
    #   2. python app/engines/applio/probe.py --url http://127.0.0.1:6969
    #   3. Copy the real inference endpoint name into api_name below, and
    #      map its real parameter names in param_map.
    #
    # Until step 3 is done, this backend safely no-ops (or raises, if
    # strict: true) instead of guessing and silently doing nothing useful.
    applio:
      url: http://127.0.0.1:6969
      api_name: null  # e.g. "/run" -- fill in after running applio_probe.py
      output_key: 0   # index (or dict key) of the output audio path in the predict() result
      param_map:
        input_audio: audio_in        # placeholder -- confirm real name via applio_probe.py
        reference_audio: voice_model  # placeholder -- confirm real name via applio_probe.py
      extra_params: {}  # optional: additional fixed parameters Applio's endpoint expects

paths:
  projects_dir: data/projects
  work_dir: data/work
  output_dir: data/output
  logs_dir: logs
  audacity_in_dir: data/work/audacity_in
  audacity_out_dir: data/work/audacity_out

mastering:
  enable_highpass: true
  highpass_hz: 80.0
  compressor_threshold_db: -18.0
  compressor_ratio: 2.0
  limiter_ceiling_db: -1.0
  makeup_gain_db: 0.0
  adaptive_enabled: true
  adaptive_target_rms_dbfs: -18.0
  adaptive_min_ratio: 1.4
  adaptive_max_ratio: 3.5
  adaptive_max_makeup_db: 6.0
  air_amount: 0.0
  air_cutoff_hz: 9000.0
  stereo_width: 1.0
  deesser_enabled: false

integration:
  external_fx:
    enabled: false
    strict: false
    command_preset: ffmpeg_vocal_polish
    command_template: []
    preset: ffmpeg_vocal_polish
    preset_library:
      ffmpeg_vocal_polish:
        - ffmpeg
        - -y
        - -i
        - "{input}"
        - -af
        - "highpass=f=80,acompressor=threshold=-20dB:ratio=2.0:attack=5:release=50,loudnorm=I=-16:TP=-1.0:LRA=7"
        - "{output}"
      wrapper_cleanup:
        - python
        - tools/external_fx_chain.py
        - --input
        - "{input}"
        - --output
        - "{output}"
        - --preset
        - "{preset}"
      wrapper_broadcast_vocal:
        - python
        - tools/external_fx_chain.py
        - --input
        - "{input}"
        - --output
        - "{output}"
        - --preset
        - "{preset}"
      rx_chain_cli:
        - rx_cli
        - --input
        - "{input}"
        - --output
        - "{output}"
        - --preset
        - "{preset}"

quality_guardrails:
  max_true_peak_dbfs: -1.0
  min_loudness_dbfs: -19.0
  max_loudness_dbfs: -14.0
  max_clipped_samples: 0
  min_crest_factor_db: 4.5
  fail_safe_enabled: true
  neutral_mastering:
    enable_highpass: true
    highpass_hz: 80.0
    compressor_threshold_db: -12.0
    compressor_ratio: 1.3
    limiter_ceiling_db: -6.0
    makeup_gain_db: 0.0
    adaptive_enabled: false

